# Headway CI — build/test gates per ecosystem + the ADR-0001 license gate.
#
# Guardrails (DEVOPS_ENGINEER role, ADR-0001):
#   - Open, self-hostable CI only: plain GitHub Actions syntax, first-party
#     actions only (actions/checkout, setup-go, setup-python, setup-node),
#     every step reproducible on a self-hosted runner or locally.
#   - Fail loudly: no job silently skips real work. Path filtering falls back
#     to "run everything" whenever change detection is ambiguous.
#   - The web job is guarded on web/package.json existing so the workflow is
#     valid while the frontend increment is still landing.
#
# Path filtering is done by a first-party `changes` job (git diff against the
# PR base / previous push head) because job-level `paths:` filters do not
# exist in Actions and third-party filter actions are avoided by policy.

name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    name: detect changed paths
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      python: ${{ steps.filter.outputs.python }}
      client: ${{ steps.filter.outputs.client }}
      web: ${{ steps.filter.outputs.web }}
      integration: ${{ steps.filter.outputs.integration }}
      adapters: ${{ steps.filter.outputs.adapters }}
      notebooks: ${{ steps.filter.outputs.notebooks }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - id: filter
        name: diff changed files against base
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          CHANGED="__ALL__"   # ambiguity -> run everything (never skip silently)
          if [ "$EVENT_NAME" = "pull_request" ] && git cat-file -e "$PR_BASE_SHA" 2>/dev/null; then
            CHANGED="$(git diff --name-only "$PR_BASE_SHA"...HEAD)"
          elif [ "$EVENT_NAME" = "push" ] \
               && [ "$PUSH_BEFORE" != "0000000000000000000000000000000000000000" ] \
               && git cat-file -e "$PUSH_BEFORE" 2>/dev/null; then
            CHANGED="$(git diff --name-only "$PUSH_BEFORE" HEAD)"
          fi
          echo "changed files:"; echo "$CHANGED"
          hit() {
            if [ "$CHANGED" = "__ALL__" ]; then echo true
            elif echo "$CHANGED" | grep -qE "$1"; then echo true
            else echo false; fi
          }
          {
            echo "go=$(hit '^services/ingestion/|^scripts/license|^\.github/workflows/')"
            echo "python=$(hit '^services/(calc|transform|api|ai)/|^db/|^scripts/license|^\.github/workflows/')"
            echo "client=$(hit '^clients/python/|^\.github/workflows/')"
            echo "web=$(hit '^web/|^scripts/license|^\.github/workflows/')"
            echo "integration=$(hit '^services/api/|^db/|^tests/integration/|^\.github/workflows/')"
            echo "adapters=$(hit '^adapters/|^contracts/|^services/transform/|^\.github/workflows/')"
            echo "notebooks=$(hit '^notebooks/|^\.github/workflows/')"
          } >> "$GITHUB_OUTPUT"

  go-ingestion:
    name: go / ingestion
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ingestion
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: services/ingestion/go.mod
          cache-dependency-path: services/ingestion/go.sum
      - name: go build
        run: go build ./...
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./... -count=1

  python-services:
    name: python / ${{ matrix.service }}
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [calc, transform, api, ai]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/pyproject.toml
      - name: install service with test extra
        # each pyproject defines a [test] optional-dependency set
        # (calc: pytest+hypothesis; transform: pytest; api: pytest+httpx; ai: pytest)
        # headway-calc is a sibling path package, not on PyPI — install it alongside
        # so api's `headway-calc>=0.5` resolves (harmless no-op for the other services)
        run: python -m pip install -e services/calc -e "services/${{ matrix.service }}[test]"
      - name: pytest
        working-directory: services/${{ matrix.service }}
        run: python -m pytest -q
      - name: grounding regression gate (AI_SYSTEMS_ENGINEER — a grounding regression fails the build)
        if: matrix.service == 'ai'
        working-directory: services/ai
        run: python -m headway_ai.regression

  python-client:
    # Analyst Python client (handoff 0018). Unit tests run against a FAKE
    # in-process API (httpx.MockTransport) — no live stack, no database.
    # A separate job rather than a python-services matrix entry: the client
    # lives under clients/ (not services/), and it deliberately depends on
    # httpx ONLY — no headway-calc sibling install (the matrix's calc
    # co-install exists for api's `headway-calc>=0.5`; the client has no
    # such requirement, verified against clients/python/pyproject.toml).
    # The pandas extra is installed because tests/test_frames.py imports
    # pandas at module scope (the DataFrame helpers are part of the suite).
    name: python / client
    needs: changes
    if: needs.changes.outputs.client == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: clients/python/pyproject.toml
      - name: install client with pandas + test extras
        run: python -m pip install -e "clients/python[pandas,test]"
      - name: pytest
        working-directory: clients/python
        run: python -m pytest -q

  adapter-harness:
    # Vendor adapter framework (handoff 0015): every registered mapping spec
    # under adapters/ must be machine-valid against
    # contracts/adapter-mapping.v0.schema.json, carry sample fixtures, map
    # every fixture row (or quarantine it with a reason), pass the target
    # contract's validation, and round-trip deterministically. A registered
    # adapter with a red harness fails the build.
    name: adapters / validation harness
    needs: changes
    if: needs.changes.outputs.adapters == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/transform/pyproject.toml
      - name: install the transform service (the adapter runtime)
        run: python -m pip install -e services/transform
      - name: run the harness over all registered adapters
        run: python3 adapters/validate

  drift-gates:
    # Hardening pass 2026-07-13 (docs/reviews/2026-07-13-hardening-pass.md):
    # the two generated artifacts that pass caught stale must now match
    # their sources on every run — services/api/openapi.json (the DR route
    # was missing from the committed spec) and web/src/regulatory/quotes.json
    # (the verbatim regulatory quotes the UI serves, extracted from
    # services/calc/REGULATORY_TRACKER.md). Each gate regenerates the
    # artifact and fails on any diff against the committed file.
    name: drift gates (openapi.json, quotes.json)
    needs: changes
    if: needs.changes.outputs.python == 'true' || needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/api/pyproject.toml
      - name: install API service (the exporter imports the app factory)
        # headway-calc is a sibling path package, not on PyPI — install it
        # alongside so api's `headway-calc>=0.5` resolves.
        run: python -m pip install -e services/calc -e services/api
      - name: openapi.json matches the app (regenerate + diff)
        working-directory: services/api
        run: |
          python3 scripts/export_openapi.py
          git diff --exit-code openapi.json
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: quotes.json matches the regulatory tracker (regenerate + diff)
        # extract-quotes.mjs is a dependency-free node script reading
        # services/calc/REGULATORY_TRACKER.md — no npm ci needed.
        run: |
          node web/scripts/extract-quotes.mjs
          git diff --exit-code web/src/regulatory/quotes.json

  db-static:
    name: python / db migrations (static)
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: install pytest
        # db/test_migrations_static.py is stdlib-only static analysis of the
        # migration SQL; no live database and no psycopg needed.
        run: python -m pip install pytest
      - name: pytest (static migration checks)
        run: python -m pytest -q db/test_migrations_static.py

  integration-postgres:
    # Standing protection for the 2026-07-10 autocommit bug class: the API
    # returned 201 while psycopg3's implicit-transaction trap kept every
    # write in a never-committed savepoint (services/api/headway_api/db.py,
    # tests/integration/README.md). Runs the API against a REAL
    # TimescaleDB/PostgreSQL 16 service container; the suite creates and
    # drops its own scratch database, so this is reproducible locally
    # against any throwaway Postgres (see tests/integration/README.md).
    # The service is a plain Docker image (not a third-party action), so the
    # first-party-actions-only guardrail holds.
    name: python / api integration (real postgres)
    needs: changes
    if: needs.changes.outputs.integration == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          # CI-only throwaway credential for the ephemeral service container;
          # not a secret (the database lives only for this job).
          POSTGRES_PASSWORD: headway-ci-only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      HEADWAY_IT_ADMIN_URL: postgres://postgres:headway-ci-only@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/api/pyproject.toml
      - name: install API service + integration suite deps
        # services/calc first: headway-calc is a sibling path package, not on PyPI
        run: python -m pip install -e services/calc -e "services/api[test]" -r tests/integration/requirements.txt
      - name: pytest (integration, real postgres)
        run: python -m pytest tests/integration -q

  web:
    name: web / build + test
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Defensive guard: the frontend increment may not have landed yet.
      # hashFiles() cannot be used in a job-level `if` (it evaluates before
      # checkout), so gate each step on this explicit existence check.
      - id: guard
        name: check web/package.json exists
        run: |
          if [ -f web/package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "web/package.json not present — web job is a no-op this run"
          fi
      - uses: actions/setup-node@v6
        if: steps.guard.outputs.present == 'true'
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: npm ci
        if: steps.guard.outputs.present == 'true'
        working-directory: web
        run: npm ci
      - name: lint
        if: steps.guard.outputs.present == 'true'
        working-directory: web
        run: npm run lint
      - name: build
        if: steps.guard.outputs.present == 'true'
        working-directory: web
        run: npm run build
      - name: test
        if: steps.guard.outputs.present == 'true'
        working-directory: web
        run: npm test -- --run

  notebooks-validate:
    # Analyst example notebooks (handoff 0018): every committed .ipynb must
    # be well-formed, schema-valid nbformat. Validity ONLY — execution needs
    # a live Headway stack with data in it, which CI does not have; the
    # honest re-execution rule lives in notebooks/README.md.
    name: notebooks / nbformat validity
    needs: changes
    if: needs.changes.outputs.notebooks == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: install nbformat
        run: python -m pip install nbformat
      - name: validate every committed notebook
        run: |
          python3 - <<'EOF'
          import glob, sys
          import nbformat

          paths = sorted(glob.glob("notebooks/**/*.ipynb", recursive=True))
          if not paths:
              print("FAIL: no notebooks found under notebooks/ (expected by CI)")
              sys.exit(1)
          failed = False
          for path in paths:
              try:
                  nb = nbformat.read(path, as_version=4)
                  nbformat.validate(nb)
                  print(f"ok   {path}")
              except Exception as exc:
                  print(f"FAIL {path}: {exc}")
                  failed = True
          sys.exit(1 if failed else 0)
          EOF

  license-gate:
    # ADR-0001 Amendment 1: permissive passes; weak-copyleft only via the
    # reviewed allowlist (scripts/license_allowlist.toml); strong copyleft,
    # non-OSI, and unknown licenses fail the build. Runs on every push/PR —
    # the license policy gates every merge, not just dependency bumps.
    name: license gate (ADR-0001)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: services/ingestion/go.mod
          cache-dependency-path: services/ingestion/go.sum
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: install go-licenses
        run: |
          go install github.com/google/go-licenses@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: install python services (all extras, so the full tree is judged)
        run: |
          python -m pip install \
            -e "services/calc[test,persist]" \
            -e "services/transform[test,kafka,db]" \
            -e "services/api[test,ingest]" \
            -e "services/ai[test,ollama]" \
            -e "clients/python[pandas,test]" \
            -r db/requirements.txt
      - uses: actions/setup-node@v6
        if: hashFiles('web/package.json') != ''
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: npm ci (populate web/node_modules for the node scan)
        if: hashFiles('web/package.json') != ''
        working-directory: web
        run: npm ci
      - name: run the gate
        run: python3 scripts/license_gate.py --ecosystem all

  sbom-scan:
    # Supply-chain gate (SECURITY_ENGINEER policy; DevOps enforces): generate
    # a source-tree Syft SBOM on every push/PR and Grype-scan it, failing on
    # severity >= CRITICAL. Releases gate harder (>= HIGH, see release.yml):
    # blocking every PR on high CVEs deep in the dependency tree — often with
    # no fix released yet — would train people to bypass the gate, while a
    # release artifact is what agencies actually deploy and is held to the
    # stricter bar. Threshold changes are Security-role decisions.
    #
    # Runs unconditionally (like license-gate): dependency manifests live in
    # every ecosystem dir, so path-filtering this job would just re-encode
    # "run everything". anchore/* actions are pinned-major, open-source
    # (Apache-2.0), self-hostable — the documented exception to the
    # first-party-only rule, because they ARE the supply-chain tools.
    name: sbom + vuln scan (source)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: syft SBOM (source, CycloneDX-JSON)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: headway-source.cdx.json
          upload-artifact: false
          upload-release-assets: false
      - name: upload SBOM artifact (short retention — CI evidence, not a release)
        uses: actions/upload-artifact@v7.0.1
        with:
          name: sbom-source-${{ github.sha }}
          path: headway-source.cdx.json
          retention-days: 7
          if-no-files-found: error
      - name: "grype scan (gate: severity >= critical for pushes/PRs)"
        uses: anchore/scan-action@v6
        with:
          sbom: headway-source.cdx.json
          fail-build: true
          severity-cutoff: critical
          output-format: table

  yaml-validate:
    name: yaml validate (compose, prometheus, workflows)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: install pyyaml
        run: python -m pip install pyyaml
      - name: validate YAML documents
        run: |
          python3 - <<'EOF'
          import glob, sys
          import yaml

          targets = sorted(
              ["deploy/compose/compose.yaml",
               "deploy/compose/prometheus/prometheus.yml"]
              + glob.glob(".github/workflows/*.yml")
              + glob.glob(".github/workflows/*.yaml")
              + glob.glob("adapters/**/mapping.v0.yaml", recursive=True))
          failed = False
          for path in targets:
              try:
                  with open(path, encoding="utf-8") as fh:
                      docs = list(yaml.safe_load_all(fh))
                  if not any(d is not None for d in docs):
                      raise ValueError("file parses but contains no YAML document")
                  print(f"ok   {path}")
              except FileNotFoundError:
                  print(f"FAIL {path}: file not found (expected by CI)")
                  failed = True
              except Exception as exc:
                  print(f"FAIL {path}: {exc}")
                  failed = True
          sys.exit(1 if failed else 0)
          EOF
