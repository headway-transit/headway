# Headway CI — build/test gates per ecosystem + the ADR-0001 license gate.
#
# Guardrails (DEVOPS_ENGINEER role, ADR-0001):
#   - Open, self-hostable CI only: plain GitHub Actions syntax, first-party
#     actions only (actions/checkout, setup-go, setup-python, setup-node),
#     every step reproducible on a self-hosted runner or locally.
#   - Fail loudly: no job silently skips real work. Path filtering falls back
#     to "run everything" whenever change detection is ambiguous.
#   - The web job is guarded on web/package.json existing so the workflow is
#     valid while the frontend increment is still landing.
#
# Path filtering is done by a first-party `changes` job (git diff against the
# PR base / previous push head) because job-level `paths:` filters do not
# exist in Actions and third-party filter actions are avoided by policy.

name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    name: detect changed paths
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      python: ${{ steps.filter.outputs.python }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - id: filter
        name: diff changed files against base
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          CHANGED="__ALL__"   # ambiguity -> run everything (never skip silently)
          if [ "$EVENT_NAME" = "pull_request" ] && git cat-file -e "$PR_BASE_SHA" 2>/dev/null; then
            CHANGED="$(git diff --name-only "$PR_BASE_SHA"...HEAD)"
          elif [ "$EVENT_NAME" = "push" ] \
               && [ "$PUSH_BEFORE" != "0000000000000000000000000000000000000000" ] \
               && git cat-file -e "$PUSH_BEFORE" 2>/dev/null; then
            CHANGED="$(git diff --name-only "$PUSH_BEFORE" HEAD)"
          fi
          echo "changed files:"; echo "$CHANGED"
          hit() {
            if [ "$CHANGED" = "__ALL__" ]; then echo true
            elif echo "$CHANGED" | grep -qE "$1"; then echo true
            else echo false; fi
          }
          {
            echo "go=$(hit '^services/ingestion/|^scripts/license|^\.github/workflows/')"
            echo "python=$(hit '^services/(calc|transform|api)/|^db/|^scripts/license|^\.github/workflows/')"
            echo "web=$(hit '^web/|^scripts/license|^\.github/workflows/')"
          } >> "$GITHUB_OUTPUT"

  go-ingestion:
    name: go / ingestion
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ingestion
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: services/ingestion/go.mod
          cache-dependency-path: services/ingestion/go.sum
      - name: go build
        run: go build ./...
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./... -count=1

  python-services:
    name: python / ${{ matrix.service }}
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [calc, transform, api]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/pyproject.toml
      - name: install service with test extra
        # each pyproject defines a [test] optional-dependency set
        # (calc: pytest+hypothesis; transform: pytest; api: pytest+httpx)
        run: python -m pip install -e "services/${{ matrix.service }}[test]"
      - name: pytest
        working-directory: services/${{ matrix.service }}
        run: python -m pytest -q

  db-static:
    name: python / db migrations (static)
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: install pytest
        # db/test_migrations_static.py is stdlib-only static analysis of the
        # migration SQL; no live database and no psycopg needed.
        run: python -m pip install pytest
      - name: pytest (static migration checks)
        run: python -m pytest -q db/test_migrations_static.py

  web:
    name: web / build + test
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Defensive guard: the frontend increment may not have landed yet.
      # hashFiles() cannot be used in a job-level `if` (it evaluates before
      # checkout), so gate each step on this explicit existence check.
      - id: guard
        name: check web/package.json exists
        run: |
          if [ -f web/package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "web/package.json not present — web job is a no-op this run"
          fi
      - uses: actions/setup-node@v6
        if: steps.guard.outputs.present == 'true'
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: npm ci
        if: steps.guard.outputs.present == 'true'
        working-directory: web
        run: npm ci
      - name: lint
        if: steps.guard.outputs.present == 'true'
        working-directory: web
        run: npm run lint
      - name: build
        if: steps.guard.outputs.present == 'true'
        working-directory: web
        run: npm run build
      - name: test
        if: steps.guard.outputs.present == 'true'
        working-directory: web
        run: npm test -- --run

  license-gate:
    # ADR-0001 Amendment 1: permissive passes; weak-copyleft only via the
    # reviewed allowlist (scripts/license_allowlist.toml); strong copyleft,
    # non-OSI, and unknown licenses fail the build. Runs on every push/PR —
    # the license policy gates every merge, not just dependency bumps.
    name: license gate (ADR-0001)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: services/ingestion/go.mod
          cache-dependency-path: services/ingestion/go.sum
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: install go-licenses
        run: |
          go install github.com/google/go-licenses@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: install python services (all extras, so the full tree is judged)
        run: |
          python -m pip install \
            -e "services/calc[test,persist]" \
            -e "services/transform[test,kafka,db]" \
            -e "services/api[test]" \
            -r db/requirements.txt
      - uses: actions/setup-node@v6
        if: hashFiles('web/package.json') != ''
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: npm ci (populate web/node_modules for the node scan)
        if: hashFiles('web/package.json') != ''
        working-directory: web
        run: npm ci
      - name: run the gate
        run: python3 scripts/license_gate.py --ecosystem all

  yaml-validate:
    name: yaml validate (compose, prometheus, workflows)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: install pyyaml
        run: python -m pip install pyyaml
      - name: validate YAML documents
        run: |
          python3 - <<'EOF'
          import glob, sys
          import yaml

          targets = sorted(
              ["deploy/compose/compose.yaml",
               "deploy/compose/prometheus/prometheus.yml"]
              + glob.glob(".github/workflows/*.yml")
              + glob.glob(".github/workflows/*.yaml"))
          failed = False
          for path in targets:
              try:
                  with open(path, encoding="utf-8") as fh:
                      docs = list(yaml.safe_load_all(fh))
                  if not any(d is not None for d in docs):
                      raise ValueError("file parses but contains no YAML document")
                  print(f"ok   {path}")
              except FileNotFoundError:
                  print(f"FAIL {path}: file not found (expected by CI)")
                  failed = True
              except Exception as exc:
                  print(f"FAIL {path}: {exc}")
                  failed = True
          sys.exit(1 if failed else 0)
          EOF
