# Headway — single-box Docker Compose stack (source of truth, ADR-0005).
#
# This file stands up the full open dependency set on one commodity Linux box:
# Kafka (KRaft), TimescaleDB, Apicurio Registry, MinIO, Prometheus, Grafana —
# plus the Headway app services under the `app` profile as they land.
#
# Parity guardrail: everything here is open source and runs identically
# on-prem and in gov-cloud from the same images. No cloud-only anything.
#
# Usage:
#   cp .env.example .env    # edit values; never commit .env
#   docker compose up -d    # infra only
#   docker compose --profile app up -d --build   # infra + app services
#
# VERIFICATION STATUS: authored per ADR-0002/0005/0006/0011 and YAML-validated.
# 2026-07-09: full stack live-booted healthy (6/6 healthchecks) and ran the
# MBTA end-to-end walking skeleton — see handoff 0001 Verification Evidence.
# The bootstrap-* init services below were added AFTER that run (they close
# the manual topic/bucket provisioning gap it found); their live execution is
# PENDING the next `docker compose up`. See README.md "Verification status".

name: headway

networks:
  headway:
    # Fixed name by default so helper containers (installer migrations,
    # admin-account creation) can join with `docker run --network headway`.
    # HEADWAY_NETWORK exists ONLY so a disposable parallel test stack can
    # avoid sharing DNS with a live one (see handoff 0022); production
    # installs never set it.
    name: ${HEADWAY_NETWORK:-headway}

volumes:
  kafka-data:
  timescaledb-data:
  minio-data:
  prometheus-data:
  grafana-data:
  caddy-data:      # profile `lan`: holds Caddy's local CA — losing it means new certs and fresh browser warnings
  caddy-config:

services:
  # ---------------------------------------------------------------------------
  # Apache Kafka, KRaft mode (single node, combined broker+controller).
  # Official Apache image; Apache-2.0; no ZooKeeper (ADR-0002).
  # ---------------------------------------------------------------------------
  kafka:
    image: apache/kafka:3.9.1
    restart: unless-stopped
    networks: [headway]
    ports:
      # Host-side listener for local development/debugging only.
      # In-cluster clients use kafka:9092 and never need this mapping.
      - "127.0.0.1:29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Single-node: replication factors must be 1.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      # Small-box heap pin. Kafka's JVM is the heaviest single tenant of this
      # stack (ADR-0002); 512 MiB is a STARTING POINT for the small-agency
      # box, to be measured against real fleet-telemetry load and revised in
      # the published sizing guidance — not a validated ceiling.
      KAFKA_HEAP_OPTS: -Xms256m -Xmx512m
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 + TimescaleDB — telemetry, canonical model, reporting store.
  # ---------------------------------------------------------------------------
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    networks: [headway]
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-headway}
      POSTGRES_USER: ${POSTGRES_USER:-headway}
      # Fail loudly if unset: no baked-in default password (parity with the
      # fail-loudly guardrail; secrets are injected at runtime).
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in deploy/compose/.env}
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-headway} -d ${POSTGRES_DB:-headway}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Apicurio Registry — schema authority for the connector wire contract
  # (ADR-0006; Apache-2.0, NOT Confluent Schema Registry).
  #
  # Storage choice: kafkasql. Schemas persist into a compacted Kafka topic on
  # the broker that already exists in this stack — so registry state survives
  # container restarts WITHOUT adding a second database dependency. In-memory
  # storage was rejected: losing registered contract schemas on every restart
  # is not acceptable for the component that governs the certification surface.
  # ---------------------------------------------------------------------------
  apicurio:
    image: apicurio/apicurio-registry:3.0.6
    restart: unless-stopped
    networks: [headway]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "127.0.0.1:8081:8080"
    environment:
      APICURIO_STORAGE_KIND: kafkasql
      APICURIO_KAFKASQL_BOOTSTRAP_SERVERS: kafka:9092
      QUARKUS_HTTP_PORT: 8080
    healthcheck:
      # Quarkus liveness endpoint. NOTE: relies on curl being present in the
      # image; confirm at first live boot and swap for a java-based probe if
      # absent (recorded as pending in README "Verification status").
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health/live >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object store (raw payload objects, GTFS zips).
  # Stands in identically for S3 on-prem and in gov-cloud (parity guardrail).
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    networks: [headway]
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"   # S3 API
      - "127.0.0.1:9001:9001"   # web console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-headway}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in deploy/compose/.env}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Prometheus — metrics scraping/storage.
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v3.4.1
    restart: unless-stopped
    networks: [headway]
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Grafana — dashboards over Prometheus.
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana-oss:12.0.2
    restart: unless-stopped
    networks: [headway]
    depends_on:
      - prometheus
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD in deploy/compose/.env}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ===========================================================================
  # Bootstrap — one-shot provisioning (default profile, runs on plain
  # `docker compose up`). The 2026-07-09 live run (handoff 0001, Verification
  # Evidence) found Kafka topics and the MinIO bucket had to be created by
  # hand; these init containers close that gap. Both are idempotent: safe on
  # every `up`, exit 0 when everything already exists.
  # ===========================================================================

  # Creates the v0 topics from contracts/topics.v0.md via the official
  # Kafka image's kafka-topics.sh (--if-not-exists). Adding a topic here
  # requires a contracts change first (Platform Architect governance).
  bootstrap-kafka:
    image: apache/kafka:3.9.1
    restart: "no"
    networks: [headway]
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        for topic in \
          raw.gtfs_static.feed \
          raw.gtfs_rt.vehicle_positions \
          raw.gtfs_rt.trip_updates \
          raw.gtfs_rt.alerts \
          raw.tides.passenger_events \
          raw.dr.trips \
          raw.vendor.files
        do
          /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 \
            --create --if-not-exists --topic "$$topic" \
            --partitions 1 --replication-factor 1
        done
        echo "bootstrap-kafka: all v0 topics present"

  # Creates the raw-payload bucket via the standard minio/mc init-container
  # pattern (mc mb --ignore-existing is idempotent).
  bootstrap-minio:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    restart: "no"
    networks: [headway]
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-headway}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in deploy/compose/.env}
      S3_BUCKET: ${S3_BUCKET:-headway-raw}
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        mc alias set headway http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing "headway/$$S3_BUCKET"
        echo "bootstrap-minio: bucket $$S3_BUCKET present"

  # ===========================================================================
  # Headway app services — profile `app`.
  # Build contexts point into the monorepo (ADR-0010); services land in slice
  # waves, so only what exists is uncommented.
  # ===========================================================================
  # ---------------------------------------------------------------------------
  # Image tags (handoff 0022): HEADWAY_IMAGE_TAG in .env selects which app
  # images run. `local` (the default) keeps today's behavior — images are
  # built from this source tree. A release tag (e.g. v0.2.0-alpha) runs the
  # signed images published to ghcr.io — the installer's `--upgrade` verifies
  # each signature with cosign BEFORE pulling, then sets the tag here.
  #
  # HAZARD, stated plainly: compose keeps `build:` next to `image:` so the
  # local-development flow still works. If HEADWAY_IMAGE_TAG is set to a
  # release tag, `docker compose up --build` would OVERWRITE the pulled,
  # signature-verified image with a local build wearing the release's name.
  # With a release tag set, never pass --build — let the installer manage
  # images (docs/updating.md).
  #
  # `web` is the deliberate exception: its API address is baked into the JS
  # bundle at BUILD time (see the VITE_API_BASE_URL note below), so the web
  # image is always built on the installation's own computer and keeps the
  # `local` tag. The upgrade rebuilds it from the release's source instead
  # of pulling it — documented in docs/updating.md.
  # ---------------------------------------------------------------------------
  ingestion:
    profiles: [app]
    build:
      context: ../../services/ingestion
    image: ghcr.io/headway-transit/headway-ingestion:${HEADWAY_IMAGE_TAG:-local}
    restart: unless-stopped
    networks: [headway]
    depends_on:
      kafka:
        condition: service_healthy
      apicurio:
        condition: service_healthy
      minio:
        condition: service_healthy
      # Topics and bucket must exist before the connector produces
      # (2026-07-09 live-run finding; see bootstrap services above).
      bootstrap-kafka:
        condition: service_completed_successfully
      bootstrap-minio:
        condition: service_completed_successfully
    environment:
      # Env surface matches services/ingestion/cmd/headway-ingest (the service
      # is the source of truth for its config; see its README).
      KAFKA_BROKERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://apicurio:8080 # not yet read by the service; schema registration is a next increment (ADR-0006)
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-headway}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in deploy/compose/.env}
      S3_BUCKET: ${S3_BUCKET:-headway-raw}
      S3_USE_SSL: "false" # in-network MinIO; TLS termination is a hardening increment (Security role)
      # GTFS/GTFS-RT source feeds for the walking-skeleton connector.
      GTFS_STATIC_URL: ${GTFS_STATIC_URL:-}
      GTFS_RT_VEHICLE_POSITIONS_URL: ${GTFS_RT_VEHICLE_POSITIONS_URL:-}
      GTFS_RT_TRIP_UPDATES_URL: ${GTFS_RT_TRIP_UPDATES_URL:-}
      GTFS_RT_ALERTS_URL: ${GTFS_RT_ALERTS_URL:-}
      POLL_INTERVAL: ${POLL_INTERVAL:-30s}
      AGENCY_ID: ${AGENCY_ID:-}
      # TIDES file-drop connector (handoff 0005). Drop passenger_events*.csv
      # into ./tides-drop on the host. SIMULATED data must use source
      # tides_simulated (binding rule, contracts/topics.v0.md).
      TIDES_DROP_DIR: /data/tides-drop
      TIDES_SOURCE: ${TIDES_SOURCE:-tides_simulated}
    volumes:
      # Writable: the connector moves handled files to processed/ inside it.
      - ./tides-drop:/data/tides-drop

  # Python normalization: Kafka raw.* -> canonical.* with lineage + DQ
  # quarantine (services/transform). Build context is the REPO ROOT — the
  # image bakes in contracts/raw-record-envelope.v0.schema.json (ADR-0006).
  transform:
    profiles: [app]
    build:
      context: ../..
      dockerfile: services/transform/Dockerfile
    image: ghcr.io/headway-transit/headway-transform:${HEADWAY_IMAGE_TAG:-local}
    restart: unless-stopped
    networks: [headway]
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      minio:
        condition: service_healthy
      bootstrap-kafka:
        condition: service_completed_successfully
      bootstrap-minio:
        condition: service_completed_successfully
    environment:
      KAFKA_BROKERS: kafka:9092
      # libpq-style PG* variables, NOT a URL (2026-07-09 live-run finding:
      # credentials interpolated into a URL must be percent-encoded — a
      # password containing '@' or other reserved characters breaks parsing).
      PGHOST: timescaledb
      PGPORT: "5432"
      PGUSER: ${POSTGRES_USER:-headway}
      PGPASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in deploy/compose/.env}
      PGDATABASE: ${POSTGRES_DB:-headway}
      # Object store for payload_encoding='object_ref' payloads (GTFS static
      # zips, TIDES CSVs). Same surface as the ingestion connector above.
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-headway}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in deploy/compose/.env}
      S3_BUCKET: ${S3_BUCKET:-headway-raw}
      S3_USE_SSL: "false" # in-network MinIO; TLS termination is a hardening increment
    # No healthcheck: the consumer exposes no port. The process IS the
    # container (PID 1) — if the loop dies the container exits and
    # restart: unless-stopped brings it back; docker ps shows the flapping.

  # FastAPI backend: metrics with lineage, DQ workflow, audited
  # certification, machine ingest (services/api).
  api:
    profiles: [app]
    build:
      # REPO ROOT context, like transform: headway-api installs the in-repo
      # headway-calc (path dependency; see services/api/Dockerfile and the
      # release workflow, which build the same way). The old
      # ../../services/api context stopped working when that dependency
      # landed — found live 2026-07-13 by the lan-profile boot test.
      context: ../..
      dockerfile: services/api/Dockerfile
    image: ghcr.io/headway-transit/headway-api:${HEADWAY_IMAGE_TAG:-local}
    restart: unless-stopped
    networks: [headway]
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      timescaledb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      bootstrap-kafka:
        condition: service_completed_successfully
      bootstrap-minio:
        condition: service_completed_successfully
    environment:
      # Session-token signing secret — REQUIRED (set it in .env). Not `:?`
      # here: compose interpolates `:?` file-wide even when the `app` profile
      # is inactive, which would break infra-only `docker compose up` for
      # existing .env files. The API itself refuses to start on an empty
      # secret (fail-loudly at the right layer, never a baked-in default).
      HEADWAY_SESSION_SECRET: ${HEADWAY_SESSION_SECRET:-}
      # Certification signing key (handoff 0019): 64 hex chars = the Ed25519
      # seed the API signs certifications with. Installer-generated into
      # .env (openssl rand -hex 32), same posture as the session secret:
      # env/secret file ONLY — never the database, never the repo. Empty =
      # the certify endpoint refuses with a plain-language 503 (a
      # certification is never silently recorded unsigned).
      HEADWAY_SIGNING_KEY: ${HEADWAY_SIGNING_KEY:-}
      # libpq keyword conninfo, NOT a URL — sidesteps the percent-encoding
      # trap (2026-07-09 live-run finding) without needing PG* support in
      # the app. NOTE: a password containing spaces or quotes would still
      # need libpq quoting here.
      HEADWAY_DATABASE_URL: host=timescaledb port=5432 dbname=${POSTGRES_DB:-headway} user=${POSTGRES_USER:-headway} password=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in deploy/compose/.env}
      # Machine-ingest seams (handoff 0006): MinIO + Kafka, same env surface
      # as the Go connectors. Unset would mean a loud 503 on ingest.
      KAFKA_BROKERS: kafka:9092
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-headway}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in deploy/compose/.env}
      S3_BUCKET: ${S3_BUCKET:-headway-raw}
      S3_USE_SSL: "false"
      # Browser origins allowed to call the API cross-origin, comma-separated
      # (wave-14 lesson: the FIRST real-browser login failed silently because
      # no CORS headers existed — mocked-fetch tests cannot see this class of
      # gap). Managed by the installer's network-access wiring
      # (install/install.sh --reconfigure-access); empty = CORS off, correct
      # for the default same-origin/localhost layout.
      HEADWAY_CORS_ORIGINS: ${HEADWAY_CORS_ORIGINS:-}
    healthcheck:
      # python:3.12-slim ships no curl/wget; the interpreter probes the
      # unauthenticated OpenAPI document.
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/openapi.json', timeout=3)\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

  # React/Vite frontend, static files behind non-root nginx on 8080 (web/).
  web:
    profiles: [app]
    build:
      context: ../../web
      args:
        # LIMITATION (Vite): the API origin is baked into the JS bundle at
        # BUILD time — changing it needs `docker compose build web`, not a
        # restart. Default http://localhost:8000 matches the api port
        # mapping above (the browser, not the container, calls the API).
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    image: ghcr.io/headway-transit/headway-web:local
    restart: unless-stopped
    networks: [headway]
    ports:
      - "127.0.0.1:8080:8080" # nginx listens unprivileged (non-root)
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      # 127.0.0.1, not localhost: busybox wget resolves localhost to ::1
      # first and nginx here listens IPv4-only — found live 2026-07-13 by
      # the lan-profile boot test (the probe was refused and the container
      # sat "unhealthy" while serving fine).
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ===========================================================================
  # Optional profile `lan` — Caddy reverse proxy, the "other computers in our
  # office" answer (handoff 0016). Enabled by the installer's network-access
  # question (install/install.sh --reconfigure-access) or by adding `lan` to
  # COMPOSE_PROFILES in .env. Plain-language guide: docs/network-access.md.
  #
  # What it does: terminates HTTPS on the office network using Caddy's own
  # built-in local certificate authority (`local_certs` in caddy/Caddyfile —
  # private addresses cannot get public certificates), and forwards exactly
  # two things: the web app (/) and the API (/api/*) — both under ONE
  # https:// origin, so browser->API calls are same-origin by construction
  # (the wave-14 CORS lesson, solved structurally).
  #
  # What it deliberately does NOT do: proxy any admin surface. Grafana,
  # MinIO (API + console), Prometheus, Apicurio, Kafka and Postgres stay
  # bound to 127.0.0.1 on the Headway box and are reachable only from it
  # (or over an SSH tunnel — docs/network-access.md). web/api host ports
  # also stay on 127.0.0.1; from other computers the ONLY way in is Caddy.
  # ===========================================================================
  caddy:
    profiles: [lan]
    # Pinned exact version; Apache-2.0 (github.com/caddyserver/caddy), same
    # open-license posture as every other infra image in this stack.
    image: caddy:2.10.2
    restart: unless-stopped
    networks: [headway]
    ports:
      # THE one deliberate non-localhost binding in this stack: the doorway
      # other office computers use. 80 exists only to redirect to https.
      - "80:80"
      - "443:443"
    environment:
      # The office-network address (IP or name) coworkers will type. Set by
      # the installer, which detects it and asks for confirmation — never
      # assumed. Empty => Caddy refuses to start (fail loudly): a doorway
      # that guessed its own address would guess wrong for someone.
      # (`:-` not `:?` — compose interpolates `:?` file-wide even when the
      # profile is inactive; see the HEADWAY_SESSION_SECRET note above.)
      HEADWAY_LAN_ADDRESS: ${HEADWAY_LAN_ADDRESS:-}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data      # the local CA lives here; keep it or browsers re-warn
      - caddy-config:/config
    # No depends_on: web/api may (re)start in any order or profile mix; Caddy
    # answers 502 while an upstream is down and heals on its own.
    healthcheck:
      # Caddy's admin endpoint (loopback-only inside the container).
      # 127.0.0.1, not localhost: busybox wget tries ::1 first and the
      # admin socket is IPv4 (same finding as the web healthcheck).
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:2019/config/"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ===========================================================================
  # Optional profile `sso-broker` — Keycloak (ADR-0011).
  #
  # NOT part of the default stack: the API is a native OIDC relying party with
  # local accounts, so Entra ID / Google / Okta work with zero extra
  # infrastructure. Enable this profile only for agencies that need SAML-only
  # IdPs or IdP aggregation; the API then simply treats Keycloak as its OIDC
  # provider (config change, not code change). Uncomment to use:
  #
  # keycloak:
  #   profiles: [sso-broker]
  #   image: quay.io/keycloak/keycloak:26.2
  #   restart: unless-stopped
  #   networks: [headway]
  #   command: start --http-enabled=true --hostname-strict=false
  #   ports:
  #     - "127.0.0.1:8180:8080"
