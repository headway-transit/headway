  # ===========================================================================
  # Optional profile `sso-broker` — Keycloak (ADR-0011).
  #
  # NOT part of the default stack: the API is a native OIDC relying party with
  # local accounts, so Entra ID / Google / Okta work with zero extra
  # infrastructure. Enable this profile only for agencies that need SAML-only
  # IdPs or IdP aggregation; the API then simply treats Keycloak as its OIDC
  # provider (config change, not code change). Uncomment to use:
  #
  # keycloak:
  #   profiles: [sso-broker]
  #   image: quay.io/keycloak/keycloak:26.2
  #   restart: unless-stopped
  #   networks: [headway]
  #   command: start --http-enabled=true --hostname-strict=false
  #   ports:
  #     - "127.0.0.1:8180:8080"
  #   environment:
  #     KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER:-admin}
  #     KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?set KEYCLOAK_ADMIN_PASSWORD in deploy/compose/.env}
  #   depends_on:
