# nginx config for the headway-web static image (web/Dockerfile).
# Written to run as the NON-ROOT `nginx` user: unprivileged port (8080),
# pid + temp paths under /tmp (the only writable location in the container).
pid /tmp/nginx.pid;
worker_processes auto;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /dev/stdout;
    sendfile on;

    # Non-root: every temp path must live somewhere writable.
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    server {
        listen 8080;
        root /usr/share/nginx/html;
        index index.html;

        # SPA fallback: react-router owns the paths; unknown routes serve
        # index.html (never a 404 for a client-side route).
        location / {
            try_files $uri /index.html;
        }

        # index.html must revalidate (it names the hashed asset files) …
        location = /index.html {
            add_header Cache-Control "no-cache";
        }
        # … while the content-hashed Vite assets are immutable.
        location /assets/ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }
}
